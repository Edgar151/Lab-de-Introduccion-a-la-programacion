{% extends "base.html" %}
{% block content %}

<style>
    /* Estética General Dark Tech */
    :root {
        --neon-cyan: #00f2ff;
        --dark-surface: #121212;
        --border-color: #2a2a2a;
    }

    .main-wrapper {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', Roboto, sans-serif;
    }

    .scanner-card {
        background: var(--dark-surface);
        border: 1px solid var(--border-color);
        border-radius: 24px;
        padding: 30px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        width: 100%;
        max-width: 450px;
    }

    .title-area {
        text-align: left;
        margin-bottom: 25px;
    }

    .title-area h4 {
        color: #fff;
        font-weight: 800;
        letter-spacing: -0.5px;
        margin: 0;
    }

    .title-area span {
        color: var(--neon-cyan);
        font-size: 0.85rem;
        text-transform: uppercase;
        font-weight: bold;
    }

    /* Contenedor del Lector */
    .viewport-container {
        position: relative;
        background: #000;
        border-radius: 20px;
        overflow: hidden;
        height: 350px;
        border: 1px solid #333;
    }

    #reader {
        width: 100% !important;
        height: 100% !important;
    }

    /* El visor táctico encima de la cámara */
    .tactical-overlay {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; /* Deja pasar los clics al reader */
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
    }

    .scan-window {
        width: 250px;
        height: 180px;
        border: 2px solid rgba(255,255,255,0.1);
        position: relative;
    }

    /* Esquinas Neón */
    .corner {
        position: absolute;
        width: 20px;
        height: 20px;
        border: 3px solid var(--neon-cyan);
    }
    .tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
    .tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; }
    .bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; }
    .br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }

    /* Línea de escaneo animada */
    .laser-line {
        position: absolute;
        width: 100%;
        height: 2px;
        background: var(--neon-cyan);
        box-shadow: 0 0 15px var(--neon-cyan);
        top: 0;
        animation: moveLaser 2s linear infinite;
    }

    @keyframes moveLaser {
        0% { top: 0; }
        50% { top: 100%; }
        100% { top: 0; }
    }

    /* Inputs y Botones */
    .input-custom {
        background: #1a1a1a !important;
        border: 1px solid #333 !important;
        color: #fff !important;
        border-radius: 12px !important;
        padding: 12px !important;
        font-weight: bold;
    }

    .btn-action {
        background: var(--neon-cyan);
        border: none;
        color: #000;
        font-weight: 800;
        border-radius: 12px;
        padding: 15px;
        transition: 0.3s;
        letter-spacing: 1px;
    }

    .btn-action:hover {
        background: #fff;
        box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        transform: translateY(-2px);
    }

    #reader__dashboard_section_csr button {
        background: #333 !important;
        color: white !important;
        border: none !important;
        padding: 5px 15px !important;
        border-radius: 8px !important;
    }
</style>

<div class="main-wrapper">
    <div class="scanner-card">
        <div class="title-area">
            <span>System Online</span>
            <h4>Lector de Productos</h4>
        </div>

        <div class="viewport-container">
            <div class="tactical-overlay">
                <div class="scan-window">
                    <div class="corner tl"></div>
                    <div class="corner tr"></div>
                    <div class="corner bl"></div>
                    <div class="corner br"></div>
                    <div class="laser-line"></div>
                </div>
            </div>
            
            <div id="reader"></div>
        </div>
        
        <div class="mt-4">
            <input type="text" id="manual-sku" class="form-control input-custom text-center mb-3" placeholder="Ingresar SKU manualmente...">
            <button onclick="procesarManual()" class="btn btn-action w-100">PROCESAR ESCANEO</button>
        </div>
        
        <p class="mt-3 text-center text-muted" style="font-size: 0.8rem;">
            Alinea el código de barras en el visor central
        </p>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script>
    // Configuración optimizada para lectura rápida
    const config = { 
        fps: 20, // Más FPS para lectura más fluida
        qrbox: { width: 250, height: 180 }, // Caja optimizada para código de barras
        aspectRatio: 1.0
    };

    const html5QrCode = new Html5Qrcode("reader");
    
    html5QrCode.start(
        { facingMode: "environment" }, 
        config, 
        (decodedText) => { 
            // Feedback visual rápido antes de redirigir
            document.querySelector('.laser-line').style.background = "#00ff00";
            window.location.href = "/agregar/" + decodedText; 
        }
    ).catch(err => {
        console.error("Error al iniciar cámara: ", err);
    });

    function procesarManual() {
        const code = document.getElementById('manual-sku').value;
        if(code) window.location.href = "/agregar/" + code;
    }
</script>

{% endblock %}
