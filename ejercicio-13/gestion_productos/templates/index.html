<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura de Producto</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h1>Formulario de Captura de Producto</h1>

    <div class="lista-productos">
        <h3>Inventario Consolidado</h3>
        <ul>
            {% for p in productos %}
            <li style="border-bottom: 1px solid rgba(255,255,255,0.1); padding: 10px 0;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span>
                        <strong>{{ p.id_proveedor }}</strong> | {{ p.nombre_producto }} | <small>{{ p.codigo }}</small> | <b>Total: {{ p.num_producto }}</b>
                    </span>
                    <button onclick="toggleEdit('form-{{ p.id }}')" style="background:none; border:1px solid #00d2ff; color:#00d2ff; border-radius:5px; cursor:pointer; padding: 2px 8px;">✏️ Editar</button>
                </div>

                <form id="form-{{ p.id }}" action="/editar/{{ p.id }}" method="POST" style="display:none; margin-top:10px; background:rgba(0,0,0,0.2); padding:15px; border-radius:10px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div class="field">
                            <label>ID Prov:</label>
                            <input type="text" name="nuevo_id_prov" value="{{ p.id_proveedor }}">
                        </div>
                        <div class="field">
                            <label>Nombre:</label>
                            <input type="text" name="nuevo_nombre" value="{{ p.nombre_producto }}">
                        </div>
                        <div class="field">
                            <label>Código:</label>
                            <input type="text" name="nuevo_codigo" value="{{ p.codigo }}">
                        </div>
                        <div class="field">
                            <label>Cantidad:</label>
                            <input type="number" name="nueva_cantidad" value="{{ p.num_producto }}">
                        </div>
                    </div>
                    <button type="submit" style="width:100%; margin-top:10px; background:#22c55e; color:white; border:none; padding:10px; border-radius:5px; font-weight:bold; cursor:pointer;">ACTUALIZAR DATOS</button>
                </form>
            </li>
            {% endfor %}
        </ul>
    </div>

    <hr>
    <div id="reader" style="width: 100%; max-width: 400px; margin: auto;"></div>

    <form action="/guardar" method="POST">
        <input type="text" name="id_proveedor" placeholder="ID Proveedor" required>
        <input type="text" name="nombre_producto" placeholder="Nombre del Producto" required>
        <input type="text" id="codigo_barras" name="codigo" placeholder="Código de Barras" required>
        <input type="number" name="num_producto" placeholder="Cantidad" required>
        <button type="submit">Guardar Producto</button>
    </form>

    <script>
        function toggleEdit(idForm) {
            var x = document.getElementById(idForm);
            x.style.display = (x.style.display === "none") ? "block" : "none";
        }

        function onScanSuccess(decodedText, decodedResult) {
            document.getElementById('codigo_barras').value = decodedText;
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
