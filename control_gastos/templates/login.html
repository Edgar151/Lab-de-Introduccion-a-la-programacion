<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinTrack — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #21262d;
    --accent: #1C2463; --accent2: #3b82f6;
    --text: #e6edf3; --muted: #8b949e;
    --error: #f85149; --success: #3fb950;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    background:var(--bg); font-family:'Syne',sans-serif; color:var(--text);
    min-height:100vh; display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  .bg-grid {
    position:fixed; inset:0; z-index:0;
    background-image: linear-gradient(rgba(28,36,99,.1) 1px,transparent 1px), linear-gradient(90deg,rgba(28,36,99,.1) 1px,transparent 1px);
    background-size:48px 48px;
  }
  .glow { position:fixed; border-radius:50%; filter:blur(130px); opacity:.12; pointer-events:none; }
  .glow-1 { width:500px; height:500px; background:#1C2463; top:-150px; left:-150px; }
  .glow-2 { width:400px; height:400px; background:#3b82f6; bottom:-150px; right:-100px; }

  .card {
    position:relative; z-index:1;
    background:var(--panel); border:1px solid var(--border); border-radius:16px;
    padding:44px 40px; width:420px;
    box-shadow:0 0 40px rgba(28,36,99,.25);
    animation:slideUp .55s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

  .logo { display:flex; align-items:center; gap:12px; margin-bottom:28px; }
  .logo-icon { width:40px; height:40px; background:linear-gradient(135deg,#1C2463,#3b82f6); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; }
  .logo-name { font-size:22px; font-weight:800; letter-spacing:-1px; }
  .logo-sub  { font-size:11px; color:var(--muted); font-family:'DM Mono',monospace; }

  .tabs { display:flex; gap:4px; background:rgba(255,255,255,.04); border-radius:10px; padding:4px; margin-bottom:24px; }
  .tab { flex:1; padding:9px; text-align:center; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; transition:background .2s,color .2s; color:var(--muted); }
  .tab.active { background:#1C2463; color:#fff; }

  .creds-box { background:rgba(59,130,246,.07); border:1px solid rgba(59,130,246,.2); border-radius:10px; padding:14px 16px; margin-bottom:22px; font-family:'DM Mono',monospace; font-size:12px; }
  .creds-label { color:var(--accent2); font-size:10px; letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
  .cred-row { display:flex; justify-content:space-between; margin-bottom:4px; }
  .cred-row:last-child { margin-bottom:0; }
  .cred-k { color:var(--muted); }
  .cred-v { color:var(--text); background:rgba(255,255,255,.05); padding:2px 8px; border-radius:5px; }

  .field { margin-bottom:16px; }
  label { display:block; font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:7px; }
  input { width:100%; padding:12px 14px; background:rgba(255,255,255,.04); border:1px solid var(--border); border-radius:9px; color:var(--text); font-family:'DM Mono',monospace; font-size:14px; outline:none; transition:border-color .2s,box-shadow .2s; }
  input:focus { border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.15); }

  .btn { width:100%; padding:13px; background:linear-gradient(135deg,#1C2463,#2d3d99); border:none; border-radius:9px; color:#fff; font-family:'Syne',sans-serif; font-size:14px; font-weight:700; cursor:pointer; margin-top:6px; transition:transform .15s,box-shadow .15s; }
  .btn:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(28,36,99,.5); }
  .btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }

  .msg { margin-top:14px; padding:11px 14px; border-radius:9px; font-size:13px; font-family:'DM Mono',monospace; display:none; }
  .msg.error   { background:rgba(248,81,73,.1); border:1px solid rgba(248,81,73,.3); color:var(--error); }
  .msg.success { background:rgba(63,185,80,.1);  border:1px solid rgba(63,185,80,.3);  color:var(--success); }

  .spinner { display:inline-block; width:13px; height:13px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; vertical-align:middle; margin-right:6px; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">💰</div>
    <div>
      <div class="logo-name">FinTrack</div>
      <div class="logo-sub">// control financiero personal</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-login"    onclick="setTab('login')">Iniciar Sesión</div>
    <div class="tab"        id="tab-register" onclick="setTab('register')">Registrarse</div>
  </div>

  <div class="creds-box">
    <div class="creds-label">✦ Demo — usuarios predeterminados</div>
    <div class="cred-row">
      <span class="cred-k">usuario:</span><span class="cred-v">morgan</span>
      <span class="cred-k">contraseña:</span><span class="cred-v">morgan123</span>
    </div>
    <div class="cred-row">
      <span class="cred-k">usuario:</span><span class="cred-v">chagouaz</span>
      <span class="cred-k">contraseña:</span><span class="cred-v">chagouaz123</span>
    </div>
  </div>

  <div class="field">
    <label>Usuario</label>
    <input type="text" id="username" placeholder="tu_usuario" autocomplete="off"/>
  </div>
  <div class="field" id="email-field" style="display:none">
    <label>Correo Electrónico</label>
    <input type="email" id="email" placeholder="correo@ejemplo.com"/>
  </div>
  <div class="field">
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••"/>
  </div>

  <button class="btn" id="submit-btn" onclick="handleSubmit()">Entrar</button>
  <div class="msg" id="msg"></div>
</div>

<script>
let currentTab = 'login';

// Al cargar: verificar si ya hay sesión activa → ir directo a fintrack.html
window.addEventListener('load', async () => {
  try {
    const res = await fetch('/api/session');
    const data = await res.json();
    if (data.ok) window.location.href = '/fintrack.html';
  } catch(e) { /* servidor no disponible, se queda en login */ }
});

function setTab(tab) {
  currentTab = tab;
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('email-field').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('submit-btn').textContent = tab === 'login' ? 'Entrar' : 'Crear Cuenta';
  document.getElementById('msg').style.display = 'none';
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.innerHTML = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

async function handleSubmit() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const email    = document.getElementById('email').value.trim();
  const btn      = document.getElementById('submit-btn');

  if (!username || !password) { showMsg('Completa todos los campos.', 'error'); return; }

  btn.disabled  = true;
  btn.innerHTML = '<span class="spinner"></span>' + (currentTab === 'login' ? 'Entrando...' : 'Creando...');

  try {
    const url  = currentTab === 'login' ? '/api/login' : '/api/register';
    const body = currentTab === 'login' ? { username, password } : { username, email, password };

    const res  = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();

    if (currentTab === 'login') {
      if (data.ok) {
        showMsg('✓ Bienvenido, ' + data.username + '! Redirigiendo...', 'success');
        setTimeout(() => { window.location.href = '/fintrack.html'; }, 800);
      } else {
        showMsg(data.error || 'Credenciales incorrectas.', 'error');
      }
    } else {
      if (data.ok) {
        showMsg('✓ Cuenta creada. ¡Ahora inicia sesión!', 'success');
        setTab('login');
        document.getElementById('username').value = username;
      } else {
        showMsg(data.error || 'Error al registrar.', 'error');
      }
    }
  } catch(e) {
    showMsg('No se pudo conectar con el servidor.<br>¿Está corriendo fintrack_server.py?', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = currentTab === 'login' ? 'Entrar' : 'Crear Cuenta';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSubmit(); });
</script>
</body>
</html>
